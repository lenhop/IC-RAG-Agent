# Kafka on ECS - KRaft mode (no Zookeeper)
# Usage:
#   Local:  docker compose -f docker/docker-compose.kafka.yml up -d
#   ECS:   docker compose -f docker/docker-compose.kafka.yml -f docker/docker-compose.kafka.ecs.yml up -d
#
# Topic rag_agent_message_event is created automatically by kafka-init.
# Manual: docker exec ic-rag-agent-kafka kafka-topics --create --topic rag_agent_message_event --bootstrap-server localhost:9092 --partitions 6 --replication-factor 1

services:
  kafka:
    image: apache/kafka:3.7.2
    hostname: kafka
    container_name: ic-rag-agent-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "CONTROLLER://:9093,PLAINTEXT://:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"
        reservations:
          memory: 512M
    networks:
      - kafka-network

  kafka-init:
    image: apache/kafka:3.7.2
    container_name: ic-rag-agent-kafka-init
    command: >
      sh -c "
        echo 'Waiting for Kafka...';
        until kafka-broker-api-versions --bootstrap-server kafka:9092 2>/dev/null; do sleep 2; done;
        echo 'Creating topic rag_agent_message_event...';
        kafka-topics --create --topic rag_agent_message_event --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --config retention.ms=604800000 2>/dev/null || echo 'Topic may already exist';
        echo 'Done.'
      "
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    restart: "no"

  # Optional: Kafka UI for debugging (profile: with-ui)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ic-rag-agent-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: ""
    depends_on:
      kafka:
        condition: service_healthy
    profiles:
      - with-ui
    networks:
      - kafka-network

volumes:
  kafka_data:

networks:
  kafka-network:
    driver: bridge
