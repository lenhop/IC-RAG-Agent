# Bitnami Kafka - alternative when apache/kafka pull fails (e.g. registry mirror 403)
# Usage: docker compose -f docker/docker-compose.kafka.bitnami.yml -f docker/docker-compose.kafka.ecs.yml up -d

services:
  kafka:
    image: bitnami/kafka:3.7
    hostname: kafka
    container_name: ic-rag-agent-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"
    networks:
      - kafka-network

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: ic-rag-agent-kafka-init
    command: >
      sh -c "
        echo 'Waiting for Kafka...';
        until kafka-broker-api-versions --bootstrap-server kafka:9092 2>/dev/null; do sleep 2; done;
        echo 'Creating topic rag_agent_message_event...';
        /opt/bitnami/kafka/bin/kafka-topics.sh --create --topic rag_agent_message_event --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --config retention.ms=604800000 2>/dev/null || echo 'Topic may already exist';
        echo 'Done.'
      "
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    restart: "no"

volumes:
  kafka_data:

networks:
  kafka-network:
    driver: bridge
