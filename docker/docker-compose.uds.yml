version: '3.8'

services:
  # UDS Agent - Main Application
  uds-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: uds-agent
    ports:
      - "8000:8000"
    environment:
      - UDS_HOST=0.0.0.0
      - UDS_PORT=8000
      - CH_HOST=clickhouse
      - CH_PORT=9000
      - CH_USER=default
      - CH_PASSWORD=
      - CH_DATABASE=uds
      - REDIS_URL=redis://redis:6379/0
      - UDS_LLM_PROVIDER=ollama
      - UDS_LLM_MODEL=qwen3:1.7b
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - uds-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 512M

  # ClickHouse Database
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: uds-clickhouse
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - CLICKHOUSE_DB=uds
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    networks:
      - uds-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: uds-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - uds-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 256M

  # Ollama LLM Service (Optional)
  ollama:
    image: ollama/ollama:latest
    container_name: uds-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - uds-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2.0"
        reservations:
          memory: 4G
    profiles:
      - with-llm

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: uds-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - uds-agent
    networks:
      - uds-network
    restart: unless-stopped
    profiles:
      - with-proxy

volumes:
  clickhouse_data:
  redis_data:
  ollama_data:
  nginx_logs:

networks:
  uds-network:
    driver: bridge