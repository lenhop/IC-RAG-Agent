name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment (staging/production)'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Alibaba Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login --username="${{ secrets.ACR_USERNAME }}" --password-stdin registry.cn-hangzhou.aliyuncs.com

      - name: Build Docker image
        run: |
          docker build -t uds-agent:${{ github.sha }} -f docker/Dockerfile .

      - name: Tag and push image
        run: |
          docker tag uds-agent:${{ github.sha }} registry.cn-hangzhou.aliyuncs.com/your-namespace/uds-agent:${{ github.sha }}
          docker tag uds-agent:${{ github.sha }} registry.cn-hangzhou.aliyuncs.com/your-namespace/uds-agent:latest
          docker push registry.cn-hangzhou.aliyuncs.com/your-namespace/uds-agent:${{ github.sha }}
          docker push registry.cn-hangzhou.aliyuncs.com/your-namespace/uds-agent:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to ECS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: len
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/uds-agent
            
            # Pull latest images
            docker-compose -f docker-compose.prod.yml pull
            
            # Restart services
            docker-compose -f docker-compose.prod.yml up -d
            
            # Check service status
            docker-compose -f docker-compose.prod.yml ps

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.ECS_HOST }}/health || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Initiating rollback..."
          # Rollback logic would go here
          # For now, just report the failure
